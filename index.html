<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abfahrtsmonitor</title>
    <style>
        :root {
            --bg:      #0a0a0f;
            --surface: #13131a;
            --border:  #2a2a3a;
            --text:    #e8e8f0;
            --muted:   #6a6a8a;
            --green:   #4ade80;
            --yellow:  #fbbf24;
            --red:     #f87171;
            --blue:    #60a5fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Hintergrund-Modi (via ?bg=...) ─────────────────────────────────
           transparent  → vMix / OBS Browser-Source (Overlay)
           green        → Chroma-Key auf ATEM oder anderen Mischern
           blue         → Chroma-Key Alternative
           black        → Luma-Key
           dark (std.)  → normaler Anzeigemodus am Bildschirm / Handy
        ─────────────────────────────────────────────────────────────────── */

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 1.25rem 1rem;
        }

        /* ── Suche ───────────────────────────────────── */
        .search-wrapper {
            max-width: 640px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input:focus { border-color: var(--blue); }
        .search-input::placeholder { color: var(--muted); }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            z-index: 100;
            display: none;
        }
        .suggestion-item {
            padding: 0.65rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: var(--border); }

        /* ── Board-Kopf ──────────────────────────────── */
        .board-header {
            max-width: 900px;
            margin: 0 auto 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
        }
        .stop-name {
            font-size: 1.35rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .refresh-info {
            font-size: 0.78rem;
            color: var(--muted);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── Tabelle ─────────────────────────────────── */
        .departures-table {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            border-collapse: collapse;
        }
        .departures-table th {
            text-align: left;
            padding: 0.45rem 0.75rem;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }
        .departures-table td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            vertical-align: middle;
        }
        .departures-table tr:last-child td { border-bottom: none; }

        /* ── Linien-Badge ────────────────────────────── */
        .line-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
            font-weight: 700;
            font-size: 0.82rem;
            min-width: 2.8rem;
            text-align: center;
            background: var(--border);
            color: var(--text);
        }
        /* Produktfarben */
        .product-nationalExpress .line-badge,
        .product-national        .line-badge { background: #c0392b; color: #fff; }
        .product-regionalExp     .line-badge,
        .product-regional        .line-badge { background: #e65100; color: #fff; }
        .product-suburban        .line-badge { background: #007a3d; color: #fff; }
        .product-subway          .line-badge { background: #1565c0; color: #fff; }
        .product-tram            .line-badge { background: #b71c1c; color: #fff; }
        .product-bus             .line-badge { background: #6a1b9a; color: #fff; }
        .product-ferry           .line-badge { background: #006064; color: #fff; }

        /* ── Zeiten und Verspätung ───────────────────── */
        .time-col { font-variant-numeric: tabular-nums; white-space: nowrap; }
        .on-time     { color: var(--green); }
        .delay-minor { color: var(--yellow); }
        .delay-major { color: var(--red); }
        .planned-time {
            color: var(--muted);
            text-decoration: line-through;
            font-size: 0.82rem;
            display: block;
        }
        .delay-tag {
            font-size: 0.82rem;
            margin-left: 0.2rem;
        }

        /* ── Gleis-Badge ─────────────────────────────── */
        .platform-badge {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.15rem 0.45rem;
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* ── Fortschrittsbalken ──────────────────────── */
        .refresh-bar {
            max-width: 900px;
            margin: 0.75rem auto 0;
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            overflow: hidden;
        }
        .refresh-bar-inner {
            height: 100%;
            background: var(--blue);
            border-radius: 1px;
            transition: width 1s linear;
        }

        /* ── Status-Meldung ──────────────────────────── */
        .state-message {
            max-width: 900px;
            margin: 3rem auto;
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* ── Responsive ──────────────────────────────── */
        @media (max-width: 520px) {
            .col-platform { display: none; }
            .departures-table td,
            .departures-table th { padding: 0.5rem 0.4rem; font-size: 0.88rem; }
        }

        /* ── Overlay-URL Generator ───────────────────── */
        .url-generator {
            max-width: 900px;
            margin: 2.5rem auto 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
        }
        .url-generator h3 {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            margin-bottom: 1rem;
        }
        .url-gen-stop {
            font-size: 0.88rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }
        .url-gen-stop strong { color: var(--text); }
        .bg-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .bg-btn {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--muted);
            font-size: 0.82rem;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .bg-btn:hover  { border-color: var(--blue); color: var(--text); }
        .bg-btn.active { border-color: var(--blue); color: var(--blue);
                         background: rgba(96,165,250,0.08); }
        .bg-btn .swatch {
            width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .url-output {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-family: monospace;
            font-size: 0.76rem;
            padding: 0.6rem 0.75rem;
            resize: none;
            height: 3.6rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }
        .url-output.has-url { color: var(--text); border-color: #3a3a5a; }
        .url-gen-row { display: flex; align-items: center; gap: 0.75rem; }
        .copy-btn {
            padding: 0.5rem 1.2rem;
            background: var(--blue);
            color: #0a0a0f;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.15s;
        }
        .copy-btn:hover    { opacity: 0.85; }
        .copy-btn:disabled { opacity: 0.35; cursor: default; }
        .copy-confirm {
            font-size: 0.8rem; color: var(--green);
            opacity: 0; transition: opacity 0.3s;
        }
        .copy-confirm.visible { opacity: 1; }
    </style>
</head>
<body>

<!-- ── Suchefeld ──────────────────────────────────────────── -->
<div class="search-wrapper">
    <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Haltestelle suchen … (z. B. Berlin Hbf, München Hbf)"
        autocomplete="off"
    >
    <div id="suggestions" class="suggestions"></div>
</div>

<!-- ── Board-Header ───────────────────────────────────────── -->
<div id="boardHeader" class="board-header" style="display:none">
    <span id="stopNameDisplay" class="stop-name"></span>
    <span id="refreshInfo"     class="refresh-info">Aktualisiert gerade …</span>
</div>

<!-- ── Abfahrtstabelle ────────────────────────────────────── -->
<table id="departuresTable" class="departures-table" style="display:none">
    <thead>
        <tr>
            <th>Linie</th>
            <th>Richtung</th>
            <th>Abfahrt</th>
            <th class="col-platform">Gleis</th>
        </tr>
    </thead>
    <tbody id="departuresBody"></tbody>
</table>

<!-- ── Countdown-Balken ───────────────────────────────────── -->
<div id="refreshBar" class="refresh-bar" style="display:none">
    <div id="refreshBarInner" class="refresh-bar-inner" style="width:100%"></div>
</div>

<!-- ── Status-Meldung ────────────────────────────────────── -->
<div id="stateMessage" class="state-message">
    Haltestelle eingeben um Abfahrten anzuzeigen.
</div>

<!-- ── Overlay-URL Generator ─────────────────────────────── -->
<!-- Nur im normalen Anzeigemodus sichtbar (nicht wenn ?bg= gesetzt ist) -->
<div id="urlGenerator" class="url-generator">
    <h3>Overlay-URL Generator</h3>

    <p class="url-gen-stop">
        Haltestelle: <strong id="genStopName">Noch keine Haltestelle gewählt</strong>
    </p>

    <!-- Hintergrund-Modus wählen -->
    <div class="bg-buttons">
        <button class="bg-btn active" onclick="selectBgMode('transparent')">
            <span class="swatch" style="background:repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 0/8px 8px"></span>
            Transparent
        </button>
        <button class="bg-btn" onclick="selectBgMode('green')">
            <span class="swatch" style="background:#00b140"></span>
            Grün (Chroma)
        </button>
        <button class="bg-btn" onclick="selectBgMode('blue')">
            <span class="swatch" style="background:#0047ab"></span>
            Blau (Chroma)
        </button>
        <button class="bg-btn" onclick="selectBgMode('black')">
            <span class="swatch" style="background:#000;border-color:#555"></span>
            Schwarz (Luma)
        </button>
    </div>

    <!-- Generierte URL -->
    <textarea id="overlayUrl" class="url-output" readonly
        placeholder="Haltestelle wählen → fertige URL erscheint hier"></textarea>

    <div class="url-gen-row">
        <button id="copyBtn" class="copy-btn" onclick="copyOverlayURL()" disabled>
            URL kopieren
        </button>
        <span id="copyConfirm" class="copy-confirm">Kopiert ✓</span>
    </div>
</div>


<script>
    // ─── Konfiguration ────────────────────────────────────────────────────────
    const API         = 'https://v6.db.transport.rest'; // deutschlandweite DB-API
    const REFRESH_MS  = 30_000;   // alle 30 Sekunden neu laden
    const MAX_RESULTS = 20;       // max. Zeilen in der Tabelle
    const MAX_MINUTES = 90;       // Abfahrten der nächsten 90 Minuten

    // ─── Zustand ─────────────────────────────────────────────────────────────
    let currentStopId   = null;
    let currentStopName = null;
    let refreshTimer    = null;
    let countdownTimer  = null;
    let searchTimer     = null;
    let refreshAt       = null;

    // ─── DOM ─────────────────────────────────────────────────────────────────
    const searchInput     = document.getElementById('searchInput');
    const suggestionsBox  = document.getElementById('suggestions');
    const boardHeader     = document.getElementById('boardHeader');
    const stopNameDisplay = document.getElementById('stopNameDisplay');
    const refreshInfo     = document.getElementById('refreshInfo');
    const departuresTable = document.getElementById('departuresTable');
    const departuresBody  = document.getElementById('departuresBody');
    const stateMessage    = document.getElementById('stateMessage');
    const refreshBar      = document.getElementById('refreshBar');
    const refreshBarInner = document.getElementById('refreshBarInner');

    // ─── Suche: Debounce → API ────────────────────────────────────────────────
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        const query = searchInput.value.trim();
        if (query.length < 2) { hideSuggestions(); return; }
        // Warte 300 ms bevor die API angefragt wird (spart Anfragen beim Tippen)
        searchTimer = setTimeout(() => fetchSuggestions(query), 300);
    });

    async function fetchSuggestions(query) {
        try {
            const url  = `${API}/locations?query=${encodeURIComponent(query)}&results=6&stops=true&addresses=false&poi=false`;
            const res  = await fetch(url);
            const data = await res.json();
            showSuggestions(data);
        } catch {
            hideSuggestions();
        }
    }

    function showSuggestions(stops) {
        suggestionsBox.innerHTML = '';
        if (!stops.length) { hideSuggestions(); return; }
        stops.forEach(stop => {
            const div = document.createElement('div');
            div.className   = 'suggestion-item';
            div.textContent = stop.name;
            div.addEventListener('click', () => selectStop(stop.id, stop.name));
            suggestionsBox.appendChild(div);
        });
        suggestionsBox.style.display = 'block';
    }

    function hideSuggestions() { suggestionsBox.style.display = 'none'; }

    // Klick außerhalb schließt Vorschläge
    document.addEventListener('click', e => {
        if (!e.target.closest('.search-wrapper')) hideSuggestions();
    });

    // ─── Haltestelle auswählen ────────────────────────────────────────────────
    function selectStop(id, name) {
        currentStopId   = id;
        currentStopName = name;
        searchInput.value = name;
        hideSuggestions();

        // URL-Parameter setzen → Lesezeichen/Sharing möglich
        const params = new URLSearchParams({ stop: id, name });
        history.replaceState(null, '', '?' + params.toString());

        loadDepartures();
        startAutoRefresh();

        // Generator-Panel aktualisieren
        document.getElementById('genStopName').textContent = name;
        buildOverlayURL();
    }

    // ─── Abfahrten von der API laden ──────────────────────────────────────────
    async function loadDepartures() {
        setMessage('Lade Abfahrten …');
        try {
            const url = `${API}/stops/${currentStopId}/departures`
                      + `?results=${MAX_RESULTS}&duration=${MAX_MINUTES}`;
            const res  = await fetch(url);
            const data = await res.json();

            // API gibt entweder data.departures (neu) oder direkt ein Array (alt) zurück
            const departures = data.departures ?? data;
            renderDepartures(departures);

            refreshAt = Date.now() + REFRESH_MS;
            startCountdown();
        } catch {
            setMessage('⚠ Fehler beim Laden. Nächster Versuch in 30 Sekunden.');
        }
    }

    // ─── Tabelle befüllen ─────────────────────────────────────────────────────
    function renderDepartures(departures) {
        if (!departures.length) {
            setMessage('Keine Abfahrten in den nächsten 90 Minuten.');
            return;
        }

        departuresBody.innerHTML = '';

        departures.forEach(dep => {
            const planned  = dep.plannedWhen ? new Date(dep.plannedWhen) : null;
            const actual   = dep.when        ? new Date(dep.when)        : planned;
            const delaySec = dep.delay ?? 0;
            const delayMin = Math.round(delaySec / 60);

            const tr      = document.createElement('tr');
            const product = dep.line?.product ?? 'bus';
            tr.className  = `product-${product}`;

            // Verspätungs-CSS-Klasse und Anzeigetext
            let delayClass = 'on-time';
            let delayText  = '';
            if (delaySec > 60) {
                delayClass = delayMin <= 5 ? 'delay-minor' : 'delay-major';
                delayText  = `+${delayMin}`;
            } else if (delaySec < -60) {
                delayClass = 'delay-minor';
                delayText  = `${delayMin}`;
            }

            const timeStr    = actual  ? fmt(actual)  : '–';
            const plannedStr = planned ? fmt(planned) : '';
            const platform   = dep.platform ?? dep.plannedPlatform ?? '';
            const direction  = (dep.direction ?? '–').substring(0, 42);
            const lineName   = dep.line?.name ?? '?';

            tr.innerHTML = `
                <td><span class="line-badge">${esc(lineName)}</span></td>
                <td>${esc(direction)}</td>
                <td class="time-col">
                    <span class="${delayClass}">
                        ${timeStr}${delayText ? ` <span class="delay-tag">${esc(delayText)}</span>` : ''}
                    </span>
                    ${delaySec > 60 ? `<span class="planned-time">${plannedStr}</span>` : ''}
                </td>
                <td class="col-platform">
                    ${platform ? `<span class="platform-badge">${esc(String(platform))}</span>` : ''}
                </td>
            `;
            departuresBody.appendChild(tr);
        });

        // UI einblenden
        stateMessage.style.display    = 'none';
        departuresTable.style.display = 'table';
        boardHeader.style.display     = 'flex';
        refreshBar.style.display      = 'block';
        stopNameDisplay.textContent   = currentStopName;
        refreshInfo.textContent       = `Aktualisiert: ${fmt(new Date())}`;
    }

    // ─── Hilfsfunktionen ──────────────────────────────────────────────────────

    // Zeit als "HH:MM" formatieren
    function fmt(date) {
        return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    // HTML-Sonderzeichen escapen (verhindert XSS)
    function esc(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Nur Status-Meldung anzeigen, Tabelle ausblenden
    function setMessage(msg) {
        departuresTable.style.display = 'none';
        boardHeader.style.display     = 'none';
        refreshBar.style.display      = 'none';
        stateMessage.style.display    = 'block';
        stateMessage.textContent      = msg;
    }

    // ─── Auto-Refresh ─────────────────────────────────────────────────────────
    function startAutoRefresh() {
        clearInterval(refreshTimer);
        refreshTimer = setInterval(loadDepartures, REFRESH_MS);
    }

    // Countdown-Balken (läuft von 100 % → 0 %)
    function startCountdown() {
        clearInterval(countdownTimer);
        refreshBarInner.style.width = '100%';
        countdownTimer = setInterval(() => {
            const remaining = Math.max(0, refreshAt - Date.now());
            refreshBarInner.style.width = (remaining / REFRESH_MS * 100) + '%';
        }, 500);
    }

    // ─── Overlay-URL Generator ────────────────────────────────────────────────
    //
    // Dieses Panel hilft dabei, die fertige URL für vMix oder ATEM zu erstellen.
    // Der Nutzer wählt eine Haltestelle (oben) und einen Hintergrund-Modus (unten),
    // und bekommt die fertige URL zum Einfügen in den Videomischer.
    //
    // AUFGABE: Die drei Funktionen unten sind noch nicht implementiert.
    // Implementiere sie so, dass das Panel vollständig funktioniert.

    let activeBgMode = 'transparent'; // aktuell gewählter Modus

    const genStopName  = document.getElementById('genStopName');
    const overlayUrl   = document.getElementById('overlayUrl');
    const copyBtn      = document.getElementById('copyBtn');
    const copyConfirm  = document.getElementById('copyConfirm');

    // ── selectBgMode(mode) ────────────────────────────────────────────────────
    // Wird aufgerufen, wenn der Nutzer einen der vier Modus-Buttons klickt.
    //
    // Was diese Funktion tun soll:
    //   1. activeBgMode auf den neuen Wert setzen
    //   2. Den geklickten Button mit der CSS-Klasse 'active' markieren
    //      (alle anderen Buttons müssen 'active' verlieren)
    //   3. buildOverlayURL() aufrufen, damit die URL sofort aktualisiert wird
    //
    // Tipp: document.querySelectorAll('.bg-btn') gibt dir alle vier Buttons.
    //       Du kannst über sie iterieren und jeweils prüfen ob
    //       btn.getAttribute('onclick') === `selectBgMode('${mode}')`.
    //
    // TODO: Implementiere diese Funktion.
    function selectBgMode(mode) {
        activeBgMode = mode;
        // ... dein Code hier ...
    }

    // ── buildOverlayURL() ────────────────────────────────────────────────────
    // Baut die fertige Overlay-URL aus den aktuellen Werten zusammen
    // und zeigt sie im Textfeld an.
    //
    // Was diese Funktion tun soll:
    //   1. Prüfen ob currentStopId vorhanden ist — falls nicht, nichts tun
    //   2. Die Basis-URL ermitteln: window.location.origin + window.location.pathname
    //   3. URL-Parameter zusammenbauen:
    //        stop  = currentStopId
    //        name  = currentStopName
    //        bg    = activeBgMode
    //   4. Fertige URL in overlayUrl.value schreiben
    //   5. overlayUrl die CSS-Klasse 'has-url' geben (macht den Text heller)
    //   6. copyBtn.disabled = false setzen (Kopieren freischalten)
    //
    // Tipp: new URLSearchParams({ stop: ..., name: ..., bg: ... }).toString()
    //       gibt dir den fertigen Query-String ohne das '?'.
    //
    // TODO: Implementiere diese Funktion.
    function buildOverlayURL() {
        if (!currentStopId) return;
        // ... dein Code hier ...
    }

    // ── copyOverlayURL() ────────────────────────────────────────────────────
    // Kopiert die angezeigte URL in die Zwischenablage und zeigt kurz eine
    // Bestätigung an.
    //
    // Was diese Funktion tun soll:
    //   1. overlayUrl.value mit navigator.clipboard.writeText() kopieren
    //   2. Nach erfolgreichem Kopieren: copyConfirm die Klasse 'visible' geben
    //   3. Nach 2 Sekunden: 'visible' wieder entfernen
    //
    // Tipp: navigator.clipboard.writeText() gibt ein Promise zurück — nutze .then()
    //       oder async/await.
    //
    // TODO: Implementiere diese Funktion.
    function copyOverlayURL() {
        // ... dein Code hier ...
    }

    // ─── Beim Start: URL-Parameter auslesen ──────────────────────────────────
    // Lesezeichen:  ?stop=8011160&name=Berlin+Hbf
    // Hintergrund:  ?bg=transparent|green|blue|black  (Standard: dark)
    (function init() {
        const params = new URLSearchParams(window.location.search);

        // ── Hintergrundfarbe setzen ───────────────────────────────────────
        const bgMap = {
            transparent: 'transparent',          // vMix / OBS Overlay
            green:       '#00b140',              // Chroma-Key (Broadcast-Grün)
            blue:        '#0047ab',              // Chroma-Key Alternative
            black:       '#000000',              // Luma-Key
        };
        const bgKey = params.get('bg');
        if (bgKey && bgMap[bgKey] !== undefined) {
            document.body.style.background = bgMap[bgKey];
            // Im Overlay-Modus: Suche + Generator ausblenden, nur Tabelle zeigen
            document.querySelector('.search-wrapper').style.display   = 'none';
            document.getElementById('urlGenerator').style.display     = 'none';
        }

        // ── Haltestelle aus URL laden ─────────────────────────────────────
        const stopId = params.get('stop');
        const name   = params.get('name');
        if (stopId && name) {
            searchInput.value = name;
            selectStop(stopId, name);
        }
    })();
</script>

</body>
</html>
